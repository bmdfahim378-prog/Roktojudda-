name: RoktoJoddha Android Build

on:
  push:
    branches: [ main ] # আপনার মেইন ব্রাঞ্চের নাম অনুযায়ী পরিবর্তন করুন
  pull_request:
    branches: [ main ]
  workflow_dispatch: # ম্যানুয়ালি বিল্ড শুরু করার অপশন

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x android/gradlew
        continue-on-error: true

      - name: Build Debug APK
        run: |
          cd android
          # যদি গ্র্যাডল র‍্যাপার না থাকে তবে সেটি তৈরি করবে
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          ./gradlew assembleDebug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RoktoJoddha-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
